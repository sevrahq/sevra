# cargo-deny policy for the sevra CLI — the dbmd discipline: permissive
# licenses only, no advisories, one version per crate where practical.
# Run: cargo deny check

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive only. No GPL/AGPL/LGPL-static, zero AI/LLM deps.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "Unlicense",
  # The Mozilla CA root bundle (webpki-roots) ships under CDLA-Permissive-2.0 —
  # a permissive *data* license (no copyleft, no patent traps). It's the trust
  # anchor rustls verifies TLS against; permissive and appropriate to bundle.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# These three Windows compatibility crates are pinned by unrelated direct
# dependency families (rustls/ring, rpassword, and clap/home). None exposes a
# shared runtime API in sevra, and their major-version ranges cannot unify.
skip = [
  { name = "windows-sys", version = "=0.52.0", reason = "ring/rustls compatibility pin" },
  { name = "windows-sys", version = "=0.59.0", reason = "rtoolbox compatibility pin" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
