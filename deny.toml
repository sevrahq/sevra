# cargo-deny policy for the sevra CLI — the dbmd discipline: permissive
# licenses only, no advisories, one version per crate where practical.
# Run: cargo deny check

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive only. No GPL/AGPL/LGPL-static, zero AI/LLM deps.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "Unlicense",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
