# Cross-compile, sign, and release the single `sevra` binary.
#
# Four targets, each a BARE binary asset `sevra-<target>` plus a detached
# Ed25519 signature `sevra-<target>.sig` (base64 of 64 raw bytes), signed with
# the SEVRA_CLI_SIGNING_KEY secret — the same publisher key pinned in the
# binary and the installer. A single SHA256SUMS covers every asset. install.sh
# and `sevra update` download these directly (no tarball to extract).
#
# CI-gated: cross-platform builds/signing run only on GitHub runners; they are
# authored + self-linted here, not executed on a dev host. Cut a release by
# pushing a SemVer tag (`v0.1.0`); the tag must equal the Cargo.toml version.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer to release (without leading v)"
        required: false

permissions:
  contents: write

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            ver="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "$ver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$' || {
            echo "::error::resolved version '$ver' is not SemVer" >&2; exit 1; }
          if [ "${{ github.ref_type }}" = "tag" ]; then
            cargo_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
            [ "$ver" = "$cargo_ver" ] || { echo "::error::tag '$ver' != Cargo.toml '$cargo_ver'" >&2; exit 1; }
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  preflight:
    needs: version
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo build --locked
      - run: cargo test --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans

  build:
    needs: [version, preflight]
    name: build (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: darwin-x86_64
            rust_target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
          - target_name: darwin-aarch64
            rust_target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          - target_name: linux-x86_64-musl
            rust_target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
          - target_name: linux-aarch64-musl
            rust_target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target_name }}
      - name: Install musl tools (linux x86_64)
        if: matrix.target_name == 'linux-x86_64-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross (linux aarch64)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.rust_target }}
          else
            cargo build --release --locked --target ${{ matrix.rust_target }}
          fi
      - name: Stage + sign asset
        shell: bash
        env:
          SEVRA_CLI_SIGNING_KEY: ${{ secrets.SEVRA_CLI_SIGNING_KEY }}
        run: |
          set -euo pipefail
          [ -n "$SEVRA_CLI_SIGNING_KEY" ] || { echo "::error::SEVRA_CLI_SIGNING_KEY secret is empty"; exit 1; }
          mkdir -p dist
          asset="sevra-${{ matrix.target_name }}"
          cp "target/${{ matrix.rust_target }}/release/sevra" "dist/$asset"
          # Detached Ed25519 signature (base64 of 64 raw bytes), verified by the
          # installer and `sevra update` against the pinned publisher key.
          node -e '
            const { createPrivateKey, sign } = require("node:crypto");
            const { readFileSync, writeFileSync } = require("node:fs");
            const key = createPrivateKey(Buffer.from(process.env.SEVRA_CLI_SIGNING_KEY, "base64"));
            const sig = sign(null, readFileSync(process.argv[1]), key);
            writeFileSync(process.argv[1] + ".sig", sig.toString("base64") + "\n");
          ' "dist/$asset"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: dist/*

  publish:
    needs: [version, build]
    name: publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: staged
      - name: Collect + checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find staged -type f -exec cp {} dist/ \;
          cd dist
          sha256sum sevra-* > SHA256SUMS
          ls -l
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: sevra v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
