# Cross-compile, sign, and release the single `sevra` binary.
#
# Five targets: four BARE unix binaries `sevra-<target>` plus the Windows
# `sevra-windows-x86_64.exe`, each with a detached Ed25519 signature
# `<asset>.sig` (base64 of 64 raw bytes), signed with the
# SEVRA_CLI_SIGNING_KEY secret — the same publisher key pinned in the binary
# and the installers. A single SHA256SUMS covers every asset. install.sh /
# install.ps1 and `sevra update` download these directly (no tarball to
# extract).
#
# CI-gated: cross-platform builds/signing run only on GitHub runners; they are
# authored + self-linted here, not executed on a dev host. Cut a release by
# pushing a SemVer tag (`v0.1.0`); the tag must equal the Cargo.toml version.
#
# Key-custody layout: the signing key is used ONLY in the publish job, whose
# only pre-signing action is first-party (actions/download-artifact) — no
# third-party action ever runs in the job before the key is in env. Build jobs
# never see the secret.
name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer to release (without leading v)"
        required: false

permissions:
  contents: read

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Resolve version
        id: resolve
        shell: bash
        env:
          # Bound to env, never interpolated into the script (the classic
          # workflow_dispatch injection vector).
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            ver="$INPUT_VERSION"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "$ver" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$' || {
            echo "::error::resolved version '$ver' is not SemVer" >&2; exit 1; }
          # The released version must ALWAYS equal the embedded (Cargo.toml)
          # version — a mismatch (e.g. a workflow_dispatch typo) would ship
          # binaries that forever self-report older than "latest" and re-download
          # on every daily check.
          cargo_ver="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          [ "$ver" = "$cargo_ver" ] || { echo "::error::version '$ver' != Cargo.toml '$cargo_ver'" >&2; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  preflight:
    needs: version
    name: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo fmt --all --check
      - run: cargo build --locked
      - run: cargo test --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - uses: EmbarkStudios/cargo-deny-action@b66acf5e9fe20f8aba065be86778a8a4c846f902
        with:
          command: check advisories licenses bans sources

  build:
    needs: [version, preflight]
    name: build (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: darwin-x86_64
            rust_target: x86_64-apple-darwin
            os: macos-15-intel
            use_cross: false
          - target_name: darwin-aarch64
            rust_target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          - target_name: linux-x86_64-musl
            rust_target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: false
          - target_name: linux-aarch64-musl
            rust_target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target_name: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: ${{ matrix.rust_target }}
      # No build cache here on purpose: the bytes produced by this job get
      # SIGNED — a restored mutable cache is a poisoning vector. Cold builds
      # cost minutes; a poisoned signed binary costs the product.
      - name: Install musl tools (linux x86_64)
        if: matrix.target_name == 'linux-x86_64-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Install cross (linux aarch64)
        if: matrix.use_cross
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853
        with:
          tool: cross@0.2.5
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.rust_target }}
          else
            cargo build --release --locked --target ${{ matrix.rust_target }}
          fi
      - name: Stage asset
        shell: bash
        run: |
          set -euo pipefail
          # Windows assets keep the .exe (directly runnable once downloaded);
          # unix assets stay bare.
          ext=""
          case "${{ matrix.target_name }}" in windows-*) ext=".exe" ;; esac
          mkdir -p dist
          cp "target/${{ matrix.rust_target }}/release/sevra${ext}" "dist/sevra-${{ matrix.target_name }}${ext}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.target_name }}
          path: dist/*

  publish:
    needs: [version, build]
    name: sign + publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: staged
      - name: Collect, sign, checksum
        shell: bash
        env:
          SEVRA_CLI_SIGNING_KEY: ${{ secrets.SEVRA_CLI_SIGNING_KEY }}
        run: |
          set -euo pipefail
          [ -n "$SEVRA_CLI_SIGNING_KEY" ] || { echo "::error::SEVRA_CLI_SIGNING_KEY secret is empty"; exit 1; }
          mkdir -p dist
          find staged -type f -exec cp {} dist/ \;
          cd dist
          # Detached Ed25519 signature per binary (base64 of 64 raw bytes),
          # verified by the installer and `sevra update` against the pinned
          # publisher key.
          for asset in sevra-*; do
            node -e '
              const { createPrivateKey, sign } = require("node:crypto");
              const { readFileSync, writeFileSync } = require("node:fs");
              const key = createPrivateKey(Buffer.from(process.env.SEVRA_CLI_SIGNING_KEY, "base64"));
              const sig = sign(null, readFileSync(process.argv[1]), key);
              writeFileSync(process.argv[1] + ".sig", sig.toString("base64") + "\n");
            ' "$asset"
          done
          sha256sum sevra-* | grep -v '\.sig$' > SHA256SUMS
          ls -l
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: sevra v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
