name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # The Windows release target's continuous guard: the full test suite on the
  # OS we cannot run locally, so a portability regression fails on push, not
  # at release time. Lint/deny stay on the canonical linux job below.
  windows:
    name: test (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo test --locked
      # The PowerShell installer must at least PARSE on every push — its full
      # run is exercised by smoke.yml at release time, but a syntax error
      # should never wait for a release to surface.
      - name: Parse-check install.ps1
        shell: pwsh
        run: |
          [void][scriptblock]::Create((Get-Content -Raw install.ps1))
          Write-Host 'install.ps1: parse OK'

  check:
    name: fmt + clippy + test + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --locked
      - uses: EmbarkStudios/cargo-deny-action@b66acf5e9fe20f8aba065be86778a8a4c846f902
        with:
          command: check advisories licenses bans sources

  msrv:
    name: build on MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: dtolnay/rust-toolchain@4e529fb27e59237866a6523e61ab248308c068b4
      - run: cargo build --locked
