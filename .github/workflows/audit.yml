# Scheduled dependency audit — catches NEW advisories between releases
# (push-time cargo-deny only sees the tree as of that commit).
name: audit

on:
  schedule:
    - cron: "17 6 * * *" # daily, off-peak
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: EmbarkStudios/cargo-deny-action@b66acf5e9fe20f8aba065be86778a8a4c846f902
        with:
          command: check advisories licenses bans sources
