# Post-manifest install smoke: run the REAL installer against a release after
# its independently reviewed digests are live on www.sevrahq.com. The origin
# manifest deliberately cannot be updated by this repository's release job;
# auto-running at release publication would only prove that fail-closed trust
# rejects a not-yet-approved version.
name: post-manifest smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Approved version to smoke (without leading v)"
        required: true

permissions:
  contents: read

jobs:
  install:
    name: install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Run the installer against the release
        shell: bash
        env:
          SEVRA_VERSION: ${{ inputs.version }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Strip a leading v and reject anything but a concrete SemVer.
          export SEVRA_VERSION="${SEVRA_VERSION#v}"
          echo "$SEVRA_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          export SEVRA_INSTALL_DIR="$RUNNER_TEMP/sevra-bin"
          sh install.sh
          "$SEVRA_INSTALL_DIR/sevra" version
          "$SEVRA_INSTALL_DIR/sevra" version --json | grep '"version"'
          "$SEVRA_INSTALL_DIR/sevra" version | grep -F "$SEVRA_VERSION"
          # The not-logged-in path is the offline contract check.
          if "$SEVRA_INSTALL_DIR/sevra" brains 2>err.txt; then
            echo "expected failure without a key" >&2; exit 1
          fi
          grep -q "not logged in" err.txt

  install-windows:
    name: install (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Run the PowerShell installer against the release
        shell: pwsh
        env:
          SEVRA_VERSION: ${{ inputs.version }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $v = "$env:SEVRA_VERSION" -replace '^v', ''
          if ($v -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$') { throw 'version must be concrete SemVer' }
          $env:SEVRA_VERSION = $v
          $env:SEVRA_INSTALL_DIR = Join-Path $env:RUNNER_TEMP 'sevra-bin'
          ./install.ps1
          $bin = Join-Path $env:SEVRA_INSTALL_DIR 'sevra.exe'
          & $bin version
          if ($LASTEXITCODE -ne 0) { throw 'version failed' }
          $json = (& $bin version --json | Out-String)
          if ($json -notmatch '"version"') { throw 'version --json missing "version"' }
          $out = (& $bin version | Out-String)
          if ($out -notmatch [regex]::Escape($env:SEVRA_VERSION)) { throw "expected pinned $env:SEVRA_VERSION" }
          # The not-logged-in path is the offline contract check.
          # PowerShell 7.3 can promote a non-zero native exit to a terminating
          # error under ErrorActionPreference=Stop. This failure is expected,
          # so capture it explicitly before restoring strict native handling.
          $nativeErrorsWereFatal = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          & $bin brains 2>err.txt
          $brainsExit = $LASTEXITCODE
          $PSNativeCommandUseErrorActionPreference = $nativeErrorsWereFatal
          if ($brainsExit -eq 0) { throw 'expected failure without a key' }
          if ((Get-Content err.txt -Raw) -notmatch 'not logged in') { throw 'missing not-logged-in message' }
